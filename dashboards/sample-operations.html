<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample — Operations Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      background: #111111;
      color: #D4D4D4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #1C1C1C;
      border: 1px solid #2E2E2E;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3);
      padding: 3rem 2.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #2E2E2E;
      color: #FFFFFF;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 1rem;
      line-height: 1.25;
    }
    p {
      font-size: 1rem;
      color: #888888;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .placeholder-chart {
      background: #111111;
      border: 2px dashed #2E2E2E;
      border-radius: 8px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888888;
      font-size: 0.875rem;
    }
    .meta {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #888888;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Operations</div>
    <h1>Operations Tracker</h1>
    <p>This is a placeholder dashboard. Replace this file with a real AI-generated <code>.html</code> dashboard and update the entry in <code>dashboards.json</code>.</p>
    <div class="placeholder-chart">Chart / Data Visualization Goes Here</div>
    <div class="meta">Sample dashboard &mdash; 10 Federal Dashboard Hub</div>
  </div>
</body>
</html>
