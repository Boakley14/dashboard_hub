<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Red circle — transparent outside, matching the actual brand mark -->
  <circle cx="50" cy="50" r="50" fill="#C52127"/>
  <!-- White serif "10" — large, fills the circle like the logo -->
  <text
    x="50" y="75"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-weight="bold"
    font-size="68"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-3"
  >10</text>
</svg>
