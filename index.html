<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10 Federal — Dashboard Hub</title>
  <meta name="description" content="10 Federal internal dashboard portal — browse, search, and open team dashboards.">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="icon" type="image/png" href="assets/img/10fed-favicon.png">
</head>
<body>

  <!-- ====================================================
       TOP NAVIGATION BAR
       ===================================================== -->
  <header class="nav" role="banner">
    <a class="nav-logo" href="index.html" aria-label="10 Federal Dashboard Hub home">
      <img src="assets/img/10fed-logo.png" alt="10 Federal logo">
      <span class="nav-logo-text">Dashboard Hub</span>
    </a>

    <div class="nav-search-wrap" role="search">
      <svg class="nav-search-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        id="search-input"
        class="nav-search"
        type="search"
        placeholder="Search dashboards…"
        aria-label="Search dashboards"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <span id="result-count" class="nav-count" aria-live="polite"></span>

    <!-- Layout toggle: switch between sidebar nav and filter-pill card view -->
    <button
      id="layout-toggle-btn"
      class="nav-layout-btn"
      type="button"
      aria-label="Toggle navigation layout"
      title="Switch between sidebar and card navigation"
    >
      <!-- Sidebar layout icon (shown when in card mode — click to switch to sidebar) -->
      <svg id="layout-icon-sidebar" width="18" height="18" fill="none" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="3" width="7" height="18" rx="1" stroke="currentColor" stroke-width="2"/>
        <path d="M13 7h8M13 12h8M13 17h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <!-- Card grid icon (shown when in sidebar mode — click to switch to card view) -->
      <svg id="layout-icon-card" width="18" height="18" fill="none" viewBox="0 0 24 24" aria-hidden="true" hidden>
        <rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
        <rect x="13" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
        <rect x="3" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
        <rect x="13" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>

    <a class="nav-settings-btn" href="settings.html" aria-label="Settings — publish a dashboard">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="nav-settings-label">Publish</span>
    </a>
  </header>

  <!-- ====================================================
       PAGE LAYOUT (sidebar + main content flex row)
       ===================================================== -->
  <div class="page-layout" id="page-layout">

    <!-- Sidebar navigation (shown in sidebar layout mode only) -->
    <aside id="sidebar" class="sidebar" aria-label="Dashboard navigation">
      <div class="sidebar-header">
        <span class="sidebar-title">Navigation</span>
        <button
          id="sidebar-collapse-btn"
          class="sidebar-collapse-btn"
          type="button"
          aria-label="Collapse sidebar"
        >
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Category navigation">
        <!-- Category items injected by nav.js -->
      </nav>
    </aside>

    <!-- Main content -->
    <main class="page-body" id="main">

      <!-- Category filter pills (shown in card layout mode) -->
      <nav class="filter-bar" id="filter-bar" aria-label="Filter by category">
        <span class="filter-label">Filter:</span>
        <!-- Pills injected by app.js -->
      </nav>

      <!-- Loading spinner -->
      <div id="spinner" class="spinner" role="status" aria-label="Loading dashboards">
        <div class="spinner-ring"></div>
      </div>

      <!-- Card grid -->
      <section
        id="card-grid"
        class="card-grid"
        aria-label="Dashboard cards"
        hidden
      ></section>

      <!-- Empty state -->
      <p id="empty-state" class="empty-state" hidden aria-live="polite">
        No dashboards match your search.
      </p>

    </main>

  </div><!-- /page-layout -->

  <footer class="page-footer">
    &copy; 10 Federal &mdash; Internal Use Only
  </footer>

  <script type="module" src="src/app.js"></script>
</body>
</html>
